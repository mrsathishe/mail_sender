# nginx site for the Mail Sender app (Next.js).
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/mail-sender
#   sudo ln -s /etc/nginx/sites-available/mail-sender /etc/nginx/sites-enabled/mail-sender
#   sudo nginx -t && sudo systemctl reload nginx
# Then add HTTPS:
#   sudo certbot --nginx -d mail.satz.co.in
#
# Unlike the static "status" site, Mail Sender is a Next.js server (SSR pages +
# API routes in one Node process). nginx does NOT serve files here — it reverse-
# proxies every request to the Next.js server that systemd runs on localhost.

server {
    listen 80;
    server_name mail.satz.co.in;

    # Emails can carry sizeable HTML bodies / attachments; lift the default 1m cap.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket / HMR upgrade headers (harmless in prod, needed if you ever proxy dev).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
