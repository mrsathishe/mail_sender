apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The Secret is created separately (kubectl or a git-ignored secret.yaml) so real
# credentials never live in version control — see secret.example.yaml.
resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml

images:
  - name: ghcr.io/mrsathishe/mail_sender
    newTag: latest
