apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mail-sender
  namespace: mail-sender
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mail-sender
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
