apiVersion: v1
kind: Secret
metadata:
  name: mail-sender-secrets
  namespace: mail-sender
type: Opaque
stringData:
  # Password in the URI must be URL-encoded (@ -> %40).
  MONGO_URI: "mongodb://user:pass@host:27017/mail_sender?authSource=mail_sender"
  AUTH_SECRET: "replace-with-openssl-rand-base64-32"
  SMTP_USER: "youraccount@gmail.com"
  SMTP_PASS: "your-16-char-app-password"
  SMTP_FROM: "youraccount@gmail.com"
