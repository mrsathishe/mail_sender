apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-sender
  namespace: mail-sender
  labels:
    app: mail-sender
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mail-sender
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: mail-sender
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mail-sender
          # Override with your registry/tag (CI or `kubectl set image`).
          image: ghcr.io/mrsathishe/mail_sender:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: APP_URL
              value: "https://mail-sender.example.com"
          # MONGO_URI, AUTH_SECRET, SMTP_* come from the Secret.
          envFrom:
            - secretRef:
                name: mail-sender-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
