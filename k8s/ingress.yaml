apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mail-sender
  namespace: mail-sender
  annotations:
    # Adjust to your controller. cert-manager issues TLS if configured.
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mail-sender.example.com
      secretName: mail-sender-tls
  rules:
    - host: mail-sender.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mail-sender
                port:
                  name: http
